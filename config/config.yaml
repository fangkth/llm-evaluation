# LLM 容量测评 — 示例配置
# 用法: uv run python runner.py --config config/config.yaml
# 或: uv run llm-eval --config config/config.yaml
# 相对路径均相对于「本 YAML 文件所在目录」解析

server:
  base_url: "http://127.0.0.1:8000"
  api_key: "EMPTY"
  model: "Qwen2.5-7B-Instruct"
  # chat_completions: /v1/chat/completions ；completions: /v1/completions
  endpoint_type: "chat_completions"

test:
  mode: "step" # baseline | step | stability
  concurrency: [1, 2, 4, 8, 16]
  duration_sec: 60
  ramp_up_sec: 10
  stream: true
  timeout_sec: 120.0
  max_tokens: 512

dataset:
  short_ratio: 0.5
  medium_ratio: 0.3
  long_ratio: 0.2
  short_file: "../prompts/short.jsonl"
  medium_file: "../prompts/medium.jsonl"
  long_file: "../prompts/long.jsonl"

sampling:
  resource_interval_sec: 1.0
  # GPU 索引；留空或省略表示自动监控本机全部 GPU
  # gpu_indices: [0, 1]
  random_seed: 42

threshold:
  max_error_rate: 0.05
  min_success_rate: 0.99 # 最大稳定并发判定：成功率下限
  max_p95_ttft_sec: 30.0
  max_p95_latency_sec: 120.0
  latency_regression_ratio: 1.2
  gpu_high_util_avg: 75.0
  gpu_high_util_peak: 88.0
  gpu_high_mem_util_avg: 80.0
  gpu_high_mem_util_peak: 92.0
  safe_concurrency_low_ratio: 0.7
  safe_concurrency_high_ratio: 0.8

output:
  base_dir: "../output"
  run_name: "" # 留空则自动生成 run_YYYYMMDD_HHMMSS
