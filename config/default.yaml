# 与 config/config.yaml 结构一致，便于作为模板复制
# 相对路径相对于本文件所在目录（config/）

server:
  base_url: "http://127.0.0.1:8000"
  api_key: "EMPTY"
  model: "Qwen2.5-7B-Instruct"
  endpoint_type: "chat_completions"

test:
  mode: "step"
  concurrency: [1, 2, 4, 8, 16]
  duration_sec: 60
  ramp_up_sec: 10
  stream: true
  timeout_sec: 120.0
  max_tokens: 512

dataset:
  short_ratio: 0.5
  medium_ratio: 0.3
  long_ratio: 0.2
  short_file: "../prompts/short.jsonl"
  medium_file: "../prompts/medium.jsonl"
  long_file: "../prompts/long.jsonl"

sampling:
  resource_interval_sec: 1.0

threshold:
  max_error_rate: 0.05
  max_p95_ttft_sec: 30.0
  max_p95_latency_sec: 120.0

output:
  base_dir: "../output"
  run_name: ""
