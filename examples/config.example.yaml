# 复制本文件后修改 server / test / dataset 即可使用。
# 相对路径（dataset、output）均相对于「本 YAML 文件所在目录」解析。

server:
  base_url: "http://127.0.0.1:8000"
  api_key: "EMPTY"
  model: "your-model-name"
  endpoint_type: "chat_completions" # chat_completions | completions

test:
  mode: "step" # baseline：仅首档；step：逐档；stability：仅最高档
  concurrency: [1, 2, 4, 8]
  duration_sec: 30
  ramp_up_sec: 5
  stream: true
  timeout_sec: 120.0
  max_tokens: 256

dataset:
  short_ratio: 0.5
  medium_ratio: 0.3
  long_ratio: 0.2
  short_file: "prompts/short.jsonl"
  medium_file: "prompts/medium.jsonl"
  long_file: "prompts/long.jsonl"

sampling:
  resource_interval_sec: 1.0
  # gpu_indices: [0, 1, 2, 3] # 省略或 [] = 自动监控本机全部 GPU
  random_seed: 42

threshold:
  min_success_rate: 0.99
  max_p95_ttft_sec: 30.0
  max_p95_latency_sec: 120.0
  latency_regression_ratio: 1.2
  gpu_high_util_avg: 75.0
  gpu_high_util_peak: 88.0
  gpu_high_mem_util_avg: 80.0
  gpu_high_mem_util_peak: 92.0
  safe_concurrency_low_ratio: 0.7
  safe_concurrency_high_ratio: 0.8

output:
  base_dir: "../output"
  run_name: ""
